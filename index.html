<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maderarte">
  <link rel="apple-touch-icon" href="maderarteicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="maderarteicon.png">
  <meta name="theme-color" content="#0E0C0A">
  <link rel="icon" type="image/png" href="maderarteicon.png">
  <title>Maderarte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family:'Algerian';
      src:local('Algerian'),url('Algerian_Regular.ttf') format('truetype');
      font-weight:normal;font-style:normal;font-display:swap;
    }

    :root {
      --ember:#D4782A;
      --amber:#E89B56;
      --gold:#C8A45C;
      --gold-pale:#E0CFA0;
      --mahogany:#2A1D12;
      --bark:#1A120B;
      --night:#0E0C0A;
      --smoke:#181410;
      --parchment:#F5F0E8;
      --cream-text:#D9CEBD;
      --muted:#6B5D4F;
      --faint:#3D332A;
      --glow-orange:rgba(212,120,42,0.12);
      --glow-gold:rgba(200,164,92,0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow-x:hidden}

    body{
      background:var(--night);
      font-family:'DM Sans',sans-serif;
      color:var(--cream-text);
      display:flex;flex-direction:column;align-items:center;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior:none;
      position:relative;
    }

    /* ═══ ATMOSPHERIC BACKGROUND ═══ */
    .atmosphere{
      position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
    }
    .atmosphere .orb{
      position:absolute;border-radius:50%;filter:blur(80px);
      animation:drift 12s ease-in-out infinite alternate;
    }
    .atmosphere .orb-1{
      width:300px;height:300px;top:-100px;left:-60px;
      background:radial-gradient(circle,rgba(212,120,42,0.08),transparent 70%);
    }
    .atmosphere .orb-2{
      width:250px;height:250px;bottom:-80px;right:-50px;
      background:radial-gradient(circle,rgba(200,164,92,0.06),transparent 70%);
      animation-delay:-6s;
    }
    .atmosphere .orb-3{
      width:200px;height:200px;top:40%;left:60%;
      background:radial-gradient(circle,rgba(212,120,42,0.04),transparent 70%);
      animation-delay:-3s;animation-duration:15s;
    }
    @keyframes drift{
      0%{transform:translate(0,0) scale(1)}
      100%{transform:translate(30px,20px) scale(1.1)}
    }

    /* Grain */
    .atmosphere::after{
      content:'';position:absolute;inset:0;
      background:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size:256px;opacity:0.5;
    }

    /* ═══ ANIMATIONS ═══ */
    @keyframes logoReveal{
      0%{opacity:0;transform:scale(0.8) translateY(20px);filter:blur(10px)}
      60%{filter:blur(0)}
      100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}
    }
    @keyframes titleSlide{
      0%{opacity:0;letter-spacing:20px;filter:blur(4px)}
      100%{opacity:1;letter-spacing:7px;filter:blur(0)}
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(24px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes glowPulse{
      0%,100%{box-shadow:0 0 20px rgba(212,120,42,0.0),0 8px 32px rgba(0,0,0,0.3)}
      50%{box-shadow:0 0 40px rgba(212,120,42,0.08),0 8px 32px rgba(0,0,0,0.3)}
    }
    @keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.8)}}
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes cardEnter{
      from{opacity:0;transform:translateX(-20px) scale(0.96)}
      to{opacity:1;transform:translateX(0) scale(1)}
    }

    .rv{opacity:0;animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards}

    /* ═══ APP CONTAINER ═══ */
    .app{
      width:100%;max-width:440px;
      padding:env(safe-area-inset-top,48px) 28px env(safe-area-inset-bottom,36px);
      display:flex;flex-direction:column;
      min-height:100vh;min-height:100dvh;
      position:relative;z-index:1;
    }

    /* ═══ HEADER ═══ */
    .header{text-align:center;padding-top:8px;margin-bottom:50px}

    .logo-container{
      position:relative;display:inline-block;margin-bottom:24px;
      animation:logoReveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    .logo-container img{
      width:100px;height:100px;border-radius:50%;display:block;
      border:2px solid rgba(200,164,92,0.15);
      animation:glowPulse 4s ease-in-out infinite;
    }
    /* Rotating ring around logo */
    .logo-ring{
      position:absolute;inset:-10px;border-radius:50%;
      border:1px solid transparent;
      border-top-color:rgba(200,164,92,0.15);
      border-right-color:rgba(212,120,42,0.08);
      animation:spin 20s linear infinite;
      pointer-events:none;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .brand-name{
      font-family:'Algerian',serif;font-weight:normal;
      font-size:2.4rem;color:var(--parchment);
      line-height:1;
      animation:titleSlide 1s cubic-bezier(0.16,1,0.3,1) 0.4s both;
    }

    .tagline-pill{
      display:inline-block;margin-top:14px;padding:6px 20px;
      background:linear-gradient(135deg,var(--ember),var(--amber),var(--gold));
      border-radius:20px;
      font-family:'Cormorant Garamond',serif;
      font-size:0.74rem;font-style:italic;font-weight:400;
      color:#fff;letter-spacing:0.5px;
      animation:fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.7s both;
    }

    .divider{
      width:40px;height:1px;margin:20px auto 0;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      opacity:0.25;
      animation:fadeUp 0.6s ease 0.9s both;
    }

    .status-badge{
      display:inline-flex;align-items:center;gap:8px;
      margin-top:16px;padding:5px 16px;border-radius:50px;
      background:rgba(55,180,100,0.05);
      border:1px solid rgba(55,180,100,0.10);
      font-size:0.46rem;font-weight:600;letter-spacing:2.8px;
      text-transform:uppercase;color:rgba(55,180,100,0.50);
      animation:fadeUp 0.6s ease 1s both;
    }
    .status-badge .dot{
      width:5px;height:5px;background:#37B464;border-radius:50%;
      box-shadow:0 0 8px rgba(55,180,100,0.4);
      animation:dotPulse 3s ease-in-out infinite;
    }

    /* ═══ NAVIGATION ═══ */
    .nav-section{margin-bottom:8px}

    .section-label{
      display:flex;align-items:center;gap:10px;
      margin-bottom:18px;padding-left:4px;
      animation:fadeUp 0.6s ease 1.1s both;opacity:0;
    }
    .section-label .bar{
      width:3px;height:16px;border-radius:2px;
      background:linear-gradient(to bottom,var(--ember),var(--gold));
    }
    .section-label span{
      font-family:'Cormorant Garamond',serif;
      font-size:0.85rem;font-weight:500;
      letter-spacing:3px;text-transform:uppercase;
      color:var(--muted);
    }

    .cards{display:flex;flex-direction:column;gap:14px}

    /* ─── CARD ─── */
    .card{
      display:flex;align-items:center;gap:16px;
      padding:22px 20px;border-radius:20px;
      text-decoration:none;color:inherit;
      position:relative;overflow:hidden;
      -webkit-user-select:none;user-select:none;
      transition:transform 0.35s cubic-bezier(0.16,1,0.3,1),
                box-shadow 0.35s ease,
                border-color 0.3s ease;
    }

    /* Active card — glass on dark */
    .card.active{
      background:linear-gradient(135deg,rgba(42,29,18,0.7),rgba(26,18,11,0.85));
      border:1px solid rgba(200,164,92,0.10);
      box-shadow:0 4px 30px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      opacity:0;animation:cardEnter 0.7s cubic-bezier(0.16,1,0.3,1) 1.2s both;
    }
    .card.active::before{
      content:'';position:absolute;left:0;top:16px;bottom:16px;
      width:3px;border-radius:0 4px 4px 0;
      background:linear-gradient(to bottom,var(--ember),var(--gold));
      box-shadow:0 0 12px rgba(212,120,42,0.3);
    }
    /* Hover shimmer line at top */
    .card.active::after{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(200,164,92,0.2),transparent);
      background-size:200% 100%;
      animation:shimmer 4s ease-in-out infinite;
    }
    .card.active:active{
      transform:scale(0.97);
      box-shadow:0 2px 15px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.02);
    }

    /* Locked */
    .card.locked{
      background:rgba(24,20,16,0.4);
      border:1px solid rgba(255,255,255,0.02);
      opacity:0;pointer-events:none;
    }
    .card.locked:nth-child(2){animation:fadeUp 0.5s ease 1.35s both}
    .card.locked:nth-child(3){animation:fadeUp 0.5s ease 1.45s both}
    .card.locked:nth-child(4){animation:fadeUp 0.5s ease 1.55s both}

    /* Icon box */
    .card-icon{
      width:50px;height:50px;min-width:50px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.3s ease;
    }
    .active .card-icon{
      background:linear-gradient(135deg,var(--glow-orange),var(--glow-gold));
      color:var(--amber);
      box-shadow:0 0 20px rgba(212,120,42,0.06);
    }
    .locked .card-icon{
      background:rgba(255,255,255,0.02);
      color:var(--faint);
    }

    /* Text */
    .card-body{flex:1}
    .card-body h3{
      font-size:0.8rem;font-weight:700;
      color:var(--parchment);letter-spacing:1.2px;margin-bottom:4px;
    }
    .locked .card-body h3{color:var(--faint)}
    .card-body p{
      font-family:'Cormorant Garamond',serif;
      font-size:0.76rem;font-weight:400;font-style:italic;
      color:var(--muted);
    }
    .locked .card-body p{color:var(--faint)}

    /* End */
    .card-end{margin-left:auto;display:flex;align-items:center}

    .arrow{
      width:28px;height:28px;border-radius:50%;
      background:rgba(212,120,42,0.08);
      display:flex;align-items:center;justify-content:center;
      transition:all 0.3s ease;
    }
    .arrow svg{color:var(--ember);opacity:0.5;transition:all 0.3s ease}
    .card.active:active .arrow{background:rgba(212,120,42,0.15)}
    .card.active:active .arrow svg{opacity:0.9;transform:translateX(2px)}

    .tag-soon{
      font-size:0.4rem;font-weight:600;letter-spacing:2px;
      color:var(--faint);text-transform:uppercase;
      padding:4px 10px;border-radius:10px;
      background:rgba(255,255,255,0.02);
    }

    /* ═══ FOOTER ═══ */
    .footer{
      margin-top:auto;text-align:center;padding-top:48px;
      opacity:0;animation:fadeUp 0.5s ease 1.7s both;
    }
    .footer-line{
      width:28px;height:1px;margin:0 auto 16px;
      background:linear-gradient(90deg,transparent,rgba(200,164,92,0.10),transparent);
    }
    .footer-brand{
      font-family:'Algerian',serif;font-weight:normal;
      font-size:0.55rem;color:var(--faint);letter-spacing:5px;
    }
    .footer-sub{
      font-size:0.36rem;color:var(--faint);
      letter-spacing:2px;text-transform:uppercase;margin-top:4px;
      opacity:0.6;
    }

    /* ═══ iOS ═══ */
    @media(display-mode:standalone){.app{padding-top:24px}}
  </style>
</head>
<body>

<!-- Atmospheric background -->
<div class="atmosphere">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="app">

  <header class="header">
    <div class="logo-container">
      <div class="logo-ring"></div>
      <img src="logomaderarte2026.png" alt="Maderarte">
    </div>
    <h1 class="brand-name">MADERARTE</h1>
    <div class="tagline-pill">Muebles con un estilo diferente para cada cliente</div>
    <div class="divider"></div>
    <div class="status-badge"><span class="dot"></span> Sistema en línea</div>
  </header>

  <div class="nav-section">
    <div class="section-label">
      <div class="bar"></div>
      <span>Módulos</span>
    </div>

    <div class="cards">

      <a href="cotizacion.html" class="card active">
        <div class="card-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div class="card-body">
          <h3>COTIZACIONES</h3>
          <p>Generar propuesta para cliente</p>
        </div>
        <div class="card-end">
          <div class="arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      </a>

      <div class="card locked">
        <div class="card-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        </div>
        <div class="card-body">
          <h3>ÓRDENES DE TRABAJO</h3>
          <p>Próximamente</p>
        </div>
        <div class="card-end"><span class="tag-soon">Pronto</span></div>
      </div>

      <div class="card locked">
        <div class="card-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <div class="card-body">
          <h3>DIRECTORIO CLIENTES</h3>
          <p>Próximamente</p>
        </div>
        <div class="card-end"><span class="tag-soon">Pronto</span></div>
      </div>

      <div class="card locked">
        <div class="card-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        </div>
        <div class="card-body">
          <h3>FINANZAS Y ABONOS</h3>
          <p>Próximamente</p>
        </div>
        <div class="card-end"><span class="tag-soon">Pronto</span></div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="footer-line"></div>
    <div class="footer-brand">MADERARTE</div>
    <div class="footer-sub">Software de Gestión &copy; 2026</div>
  </footer>

</div>

</body>
</html>
