    :root {
      --gold: #C8A45C;
      --gold-light: #E8D5A3;
      --gold-dark: #A07E3A;
      --black: #1A1A1A;
      --charcoal: #2C2C2C;
      --warm-gray: #F5F2ED;
      --cream: #FAF8F4;
      --white: #FFFFFF;
      --text: #3A3A3A;
      --text-light: #7A7A7A;
      --line: #E8E4DD;
      --orange: #E8872B;
      --orange-light: #F2A855;
      --orange-subtle: #FDF3E7;
      --orange-glow: rgba(232,135,43,0.08);
      --font-brand: 'Algerian', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm-gray);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    input, textarea, button, select {
      font-family: 'DM Sans', sans-serif;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .fade-in { animation: fadeIn 0.45s ease forwards; }

    /* ─── EDITOR STYLES ─── */
    .app-header {
      text-align: center;
      padding: 32px 0 24px;
    }
    .app-header .logo-wrap {
      display: flex; justify-content: center; margin-bottom: 14px;
    }
    .app-header h1 {
      font-family: var(--font-brand);
      font-size: 32px; font-weight: normal; letter-spacing: 5px; color: var(--black);
    }
    .app-header .tagline {
      display: inline-block; margin-top: 8px; padding: 5px 20px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light), var(--gold));
      border-radius: 20px; font-size: 11.5px; color: var(--white);
      letter-spacing: 0.8px; font-style: italic;
    }
    .app-header p {
      font-size: 12px; color: var(--text-light); letter-spacing: 1px;
      font-style: italic; margin-top: 10px;
    }

    .editor-wrap {
      max-width: 680px; margin: 0 auto; padding: 20px 16px 110px;
    }

    .card {
      background: var(--white); border-radius: 12px; padding: 20px;
      margin-bottom: 16px; border: 1px solid var(--line);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .section-title {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .section-title .bar {
      width: 3px; height: 16px; background: var(--orange); border-radius: 2px;
    }
    .section-title span {
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
      font-weight: 600; color: var(--text-light);
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .field-label {
      display: block; font-size: 11px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-light); margin-bottom: 4px;
    }

    .field-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--line); border-radius: 6px;
      font-size: 15px; color: var(--text); background: var(--white);
      outline: none; transition: border-color 0.2s;
    }
    .field-input:focus { border-color: var(--gold); }
    .field-input::placeholder { color: #c0bbb3; }

    .field-group { margin-bottom: 14px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Item editor */
    .item-card {
      padding: 16px; background: var(--white); border-radius: 10px;
      border: 1px solid var(--line); margin-bottom: 12px; position: relative;
    }
    .item-card .btn-remove {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; color: #ccc; cursor: pointer; padding: 4px;
    }
    .item-card .btn-remove:hover { color: #e74c3c; }

    .item-grid { display: flex; gap: 12px; margin-top: 10px; }
    .item-grid > div { flex: 1; }
    .item-grid > div:nth-child(2),
    .item-grid > div:nth-child(3) { flex: 2; }

    .item-input-sm {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--line); border-radius: 6px;
      font-size: 14px; color: var(--text); outline: none;
    }
    .item-input-sm:focus { border-color: var(--gold); }

    .item-total-display {
      padding: 10px 14px; background: var(--warm-gray);
      border-radius: 6px; font-size: 15px; font-weight: 600;
      color: var(--gold-dark);
    }

    .item-textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--line); border-radius: 6px;
      font-size: 14px; color: var(--text); resize: vertical; outline: none;
    }
    .item-textarea:focus { border-color: var(--gold); }

    .btn-add-item {
      width: 100%; padding: 12px;
      border: 2px dashed rgba(200,164,92,0.3); border-radius: 10px;
      background: rgba(200,164,92,0.03); color: var(--gold);
      font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s;
    }
    .btn-add-item:hover {
      background: rgba(200,164,92,0.1);
      border-color: var(--gold);
    }

    .total-bar {
      margin-top: 16px; padding: 16px 20px;
      background: linear-gradient(135deg, var(--charcoal), var(--black));
      border-radius: 10px; display: flex;
      justify-content: space-between; align-items: center;
    }
    .total-bar .label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--gold-light);
    }
    .total-bar .amount {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 26px; font-weight: 700; color: var(--gold);
    }

    /* Condiciones */
    .condicion-row {

    .btn-preview, .btn-export {

      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      letter-spacing: 0.5px; transition: opacity 0.2s;

    .btn-preview {
      background: linear-gradient(135deg, var(--charcoal), var(--black));
      color: var(--gold-light);
    }
    .btn-export {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--white);
    }
    .btn-preview:hover, .btn-export:hover { opacity: 0.9; }

    .preview-body { background: var(--charcoal); }

      position: fixed; top: 0; left: 0; right: 0;

    .btn-edit-back {

    function uid() { return Math.random().toString(36).substr(2, 9); }

    function getFechaHoy() {
      const d = new Date();
      return `${d.getDate()} de ${MESES_ES[d.getMonth()]} de ${d.getFullYear()}`;
    }

    function dateToISO(fechaStr) {
      try {
        const parts = fechaStr.split(' de ');
        if (parts.length !== 3) return '';
        const day = parseInt(parts[0]);
        const monthIdx = MESES_ES.findIndex(m => m.toLowerCase() === parts[1].toLowerCase());
        const year = parseInt(parts[2]);
        if (monthIdx === -1 || isNaN(day) || isNaN(year)) return '';
        return `${year}-${String(monthIdx+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      } catch(e) { return ''; }
    }

    function isoToFecha(iso) {
      try {
        const [y,m,d] = iso.split('-').map(Number);
        return `${d} de ${MESES_ES[m-1]} de ${y}`;
      } catch(e) { return iso; }

    // ─── RENDER QUOTATION DOCUMENT ───
    function renderDocument() {
      const total = getTotal();
      const c = state.cliente;

      let itemsHTML = '';
      state.items.forEach((item, idx) => {
        const rowTotal = item.cantidad * item.valorUnitario;
        itemsHTML += `
          <div class="items-row ${idx % 2 === 0 ? 'even' : 'odd'}">
            <div class="num">${String(idx + 1).padStart(2, '0')}</div>
            <div class="desc">${esc(item.descripcion)}</div>
            <div class="qty">${item.cantidad}</div>
            <div class="unit-price">${formatCurrency(item.valorUnitario)}</div>
            <div class="row-total">${formatCurrency(rowTotal)}</div>
          </div>`;
      });

      let condHTML = '';
      state.condiciones.forEach(cond => {
        condHTML += `<div class="doc-condition"><span class="diamond">◆</span><span>${esc(cond)}</span></div>`;
      });

      const detallesSection = state.detalles ? `
        <div class="doc-section">
          <div class="doc-section-title"><div class="bar"></div><span>Detalles, Maderas y Acabados</span></div>
          <div class="doc-details">${esc(state.detalles)}</div>
        </div>` : '';

      // Gallery - only items that have photos
      const itemsWithPhotos = state.items.filter(i => i.foto);
      const galleryHTML = itemsWithPhotos.length > 0 ? `
        <div class="doc-section">
          <div class="doc-section-title"><div class="bar"></div><span>Galería de Productos</span></div>
          <div class="doc-gallery">
            ${itemsWithPhotos.map(item => `
              <div class="doc-gallery-item">
                <img src="${item.foto}" alt="${esc(item.descripcion)}">
                <div class="caption">${esc(item.descripcion)}</div>
              </div>
            `).join('')}
          </div>
        </div>` : '';

      // Asesor
      const asesorHTML = state.asesor.nombre ? `
        <div class="doc-asesor">
          <div class="doc-asesor-box">
            <div class="firma-line"></div>
            <div class="nombre">${esc(state.asesor.nombre)}</div>
            <div class="cargo">${esc(state.asesor.cargo)}</div>
          </div>
        </div>` : '';

      // Mensaje personalizado
      const mensajeHTML = state.mensaje.trim() ? `
        <div class="doc-mensaje-wrap">
          <div class="doc-mensaje">
            <div class="text"><span class="dash"></span>${esc(state.mensaje)}<span class="dash"></span></div>
          </div>
        </div>` : '';

      return `
        <div class="doc">
          <div class="gold-bar"></div>

          <div class="doc-header">
            <div class="logo-side">
              ${logoSVG(68, '#C8A45C')}
              <div>
                <div class="brand-name">MADERARTE</div>
                <div class="brand-tagline">Muebles con un estilo diferente para cada cliente</div>
              </div>
            </div>
            <div class="quote-side">
              <div class="quote-label">Cotización</div>
              <div class="quote-number">N° ${esc(state.numero)}</div>
              <div class="quote-date">${esc(state.fecha)}</div>
            </div>
          </div>

          <div class="doc-contact-bar">
            <div class="item">${icons.mapPin}<span>Sede Principal: Transv 9 # 6N-26</span></div>
            <div class="separator"></div>
            <div class="item">${icons.mapPin}<span>Sede Norte: C.C. Terraplaza L-113</span></div>
            <div class="separator"></div>
            <div class="item">${icons.phone}<span>300 674 8590</span></div>
            <div class="separator"></div>
            <div class="item">${icons.whatsapp}<span>311 747 6465</span></div>
            <div class="separator"></div>
            <div class="item">${icons.instagram}<span>@maderartepopayan</span></div>
          </div>

          <div class="doc-section first">
            <div class="doc-section-title"><div class="bar"></div><span>Datos del Cliente</span></div>
            <div class="client-grid">
              <div class="field"><div class="label">Nombre / Razón Social</div><div class="value">${esc(c.nombre)}</div></div>
              <div class="field"><div class="label">Cédula / NIT</div><div class="value">${esc(c.cedula)}</div></div>
              <div class="field"><div class="label">Teléfono</div><div class="value">${esc(c.telefono)}</div></div>
              <div class="field"><div class="label">Email</div><div class="value">${esc(c.email)}</div></div>
              <div class="field full"><div class="label">Dirección de Instalación / Entrega</div><div class="value">${esc(c.direccion)}</div></div>
            </div>
          </div>

          <div class="doc-section">
            <div class="doc-section-title"><div class="bar"></div><span>Especificaciones del Proyecto</span></div>
            <div class="items-header">
              <div>#</div><div>Descripción del Mueble</div><div>Cant.</div><div>V. Unitario</div><div>Total</div>
            </div>
            ${itemsHTML}
            <div class="doc-total-wrap">
              <div class="doc-total-box">
                <div class="label">Inversión Total</div>
                <div class="amount">${formatCurrency(total)}</div>
              </div>
            </div>
          </div>

          ${detallesSection}

          <div class="doc-section last">
            <div class="doc-section-title"><div class="bar"></div><span>Condiciones Comerciales</span></div>

          ${galleryHTML}

          <div class="doc-footer">
            <div class="left">${logoSVG(30, '#E8D5A3')}<span>MADERARTE</span></div>

          <div class="gold-bar"></div>

    }

    // ─── RENDER EDITOR ───
    function renderEditor() {
      const total = getTotal();
      let itemsEditorHTML = '';

      state.items.forEach((item, idx) => {
        const rowTotal = item.cantidad * item.valorUnitario;
        itemsEditorHTML += `
          <div class="item-card" data-id="${item.id}">
            <button class="btn-remove" onclick="removeItem('${item.id}')" title="Eliminar">${icons.trash}</button>
            <div class="field-group">
              <label class="field-label">Descripción del mueble</label>
              <textarea class="item-textarea" rows="2" onchange="updateItem('${item.id}','descripcion',this.value)">${esc(item.descripcion)}</textarea>
            </div>
            <div class="item-grid">
              <div>
                <label class="field-label">Cantidad</label>
                <input type="number" min="1" value="${item.cantidad}" class="item-input-sm" onchange="updateItem('${item.id}','cantidad',parseInt(this.value)||1)">
              </div>
              <div>
                <label class="field-label">Valor Unitario</label>
                <input type="number" min="0" step="100000" value="${item.valorUnitario}" class="item-input-sm" onchange="updateItem('${item.id}','valorUnitario',parseInt(this.value)||0)">
              </div>
              <div>
                <label class="field-label">Total</label>
                <div class="item-total-display">${formatCurrency(rowTotal)}</div>
              </div>
            </div>
            <div class="photo-upload-area">
              ${item.foto
                ? `<img src="${item.foto}" class="photo-preview" alt="Foto">
                   <button class="btn-photo-rm" onclick="removePhoto('${item.id}')" title="Quitar foto">${icons.trash}</button>`
                : `<button class="btn-photo" onclick="uploadPhoto('${item.id}')">${icons.camera} Agregar Foto</button>`
              }
            </div>
          </div>`;
      });

      let condEditorHTML = '';
      state.condiciones.forEach((cond, i) => {
        condEditorHTML += `
          <div class="condicion-row">
            <span class="diamond">◆</span>
            <span class="text">${esc(cond)}</span>
            <button class="btn-rm" onclick="removeCondicion(${i})">${icons.trash}</button>
          </div>`;
      });

      document.body.className = '';
      document.getElementById('app').innerHTML = `
        <div class="editor-wrap fade-in">
          <a href="index.html" class="btn-back no-print">${icons.back}</a>
          <div class="app-header">
            <div class="logo-wrap">${logoSVG(72, '#C8A45C')}</div>
            <h1>MADERARTE</h1>
            <div class="tagline">Muebles con un estilo diferente para cada cliente</div>
            <p>Generador de Cotizaciones</p>
          </div>

          <div class="card">
            <div class="section-title"><div class="bar"></div><span>Información de Cotización</span></div>
            <div class="grid-2">
              <div class="field-group">
                <label class="field-label">N° Cotización</label>
                <input class="field-input" value="${esc(state.numero)}" onchange="state.numero=this.value">
              </div>
              <div class="field-group">
                <label class="field-label">Fecha</label>
                <input class="field-input" type="date" value="${dateToISO(state.fecha)}" onchange="state.fecha=isoToFecha(this.value)">
              </div>
            </div>
          </div>

          <div class="card">
            <div class="section-title"><div class="bar"></div><span>Datos del Cliente</span></div>
            <div class="field-group">
              <label class="field-label">Nombre / Razón Social</label>
              <input class="field-input" value="${esc(state.cliente.nombre)}" onchange="state.cliente.nombre=this.value">
            </div>
            <div class="grid-2">
              <div class="field-group">
                <label class="field-label">Cédula / NIT</label>
                <input class="field-input" value="${esc(state.cliente.cedula)}" onchange="state.cliente.cedula=this.value">
              </div>
              <div class="field-group">
                <label class="field-label">Teléfono</label>
                <input class="field-input" value="${esc(state.cliente.telefono)}" onchange="state.cliente.telefono=this.value">
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">Email</label>
              <input class="field-input" type="email" value="${esc(state.cliente.email)}" onchange="state.cliente.email=this.value">
            </div>
            <div class="field-group">
              <label class="field-label">Dirección de Instalación / Entrega</label>
              <input class="field-input" value="${esc(state.cliente.direccion)}" onchange="state.cliente.direccion=this.value">
            </div>
          </div>

          <div class="card">
            <div class="section-title"><div class="bar"></div><span>Muebles y Productos</span></div>
            ${itemsEditorHTML}
            <button class="btn-add-item" onclick="addItem()">${icons.plus} Agregar Mueble</button>
            <div class="total-bar">
              <span class="label">Inversión Total</span>
              <span class="amount">${formatCurrency(total)}</span>
            </div>
          </div>

          <div class="card">
            <div class="section-title"><div class="bar"></div><span>Detalles, Maderas y Acabados</span></div>
            <div class="field-group">
              <textarea class="item-textarea" rows="4" placeholder="Describe los tipos de madera, acabados, colores y detalles especiales del proyecto..." onchange="state.detalles=this.value">${esc(state.detalles)}</textarea>
            </div>
          </div>

          <div class="card">
            <div class="section-title"><div class="bar"></div><span>Condiciones Comerciales</span></div>
            ${condEditorHTML}
            <div class="add-condicion">
              <input id="newCondInput" type="text" placeholder="Agregar nueva condición..." value="${esc(state.newCondicion)}" onkeydown="if(event.key==='Enter')addCondicion()">
              <button onclick="addCondicion()">Agregar</button>
            </div>
          </div>
          <div class="card">
            <div class="section-title"><div class="bar"></div><span>Mensaje para el Cliente</span></div>
            <div class="field-group">
              <textarea class="item-textarea" rows="3" placeholder="Escribe un mensaje personalizado para tu cliente..." onchange="state.mensaje=this.value">${esc(state.mensaje)}</textarea>
            </div>
          </div>
          <div class="card">
            <div class="section-title"><div class="bar"></div><span>Asesor Comercial</span></div>
            <div class="grid-2">
              <div class="field-group">
                <label class="field-label">Nombre del Asesor</label>
                <input class="field-input" value="${esc(state.asesor.nombre)}" placeholder="Nombre completo" onchange="state.asesor.nombre=this.value">
              </div>
              <div class="field-group">
                <label class="field-label">Cargo</label>
                <input class="field-input" value="${esc(state.asesor.cargo)}" placeholder="ej: Asesor Comercial" onchange="state.asesor.cargo=this.value">
              </div>
            </div>
          </div>
        </div>

        <div class="bottom-bar">
          <button class="btn-preview" onclick="showPreview()">${icons.eye} Vista Previa</button>
          <button class="btn-export" onclick="guardarEnNube()">${icons.cloud} Guardar</button>
        </div>`;
    }

    // ─── RENDER PREVIEW ───
    function renderPreview() {
      document.body.className = 'preview-body';
      document.getElementById('app').innerHTML = `
        <div class="preview-controls">
          <button class="btn-edit-back" onclick="showEditor()">${icons.edit} Editar</button>
          <button class="btn-save-pdf" onclick="guardarEnNube()">${icons.cloud} Guardar</button>
        </div>
        <div class="preview-wrap fade-in">
          <div class="preview-paper" id="print-area">
            ${renderDocument()}
          </div>
        </div>`;
    }

    // ─── ACTIONS ───
    function updateItem(id, field, value) {
      const item = state.items.find(i => i.id === id);
      if (item) { item[field] = value; renderEditor(); }
    }

    function removeItem(id) {
      state.items = state.items.filter(i => i.id !== id);
      renderEditor();
    }

    function addItem() {
      state.items.push({ id: uid(), descripcion: '', cantidad: 1, valorUnitario: 0, foto: '' });
      renderEditor();
      // Scroll to new item
      setTimeout(() => {
        const cards = document.querySelectorAll('.item-card');
        if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    }

    function removeCondicion(idx) {
      state.condiciones.splice(idx, 1);
      renderEditor();
    }

    function addCondicion() {
      const input = document.getElementById('newCondInput');
      const val = input ? input.value.trim() : state.newCondicion.trim();
      if (val) {
        state.condiciones.push(val);
        state.newCondicion = '';
        renderEditor();
      }
    }

    function uploadPhoto(itemId) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          // Resize image to max 400px to keep file light
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxW = 600;
            const scale = Math.min(1, maxW / img.width);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const b64 = canvas.toDataURL('image/jpeg', 0.82);
            const item = state.items.find(i => i.id === itemId);
            if (item) { item.foto = b64; renderEditor(); }
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    function removePhoto(itemId) {
      const item = state.items.find(i => i.id === itemId);
      if (item) { item.foto = ''; renderEditor(); }
    }

    function showPreview() {
      state.view = 'preview';
      renderPreview();
      window.scrollTo(0, 0);
    }

    function showEditor() {
      state.view = 'edit';
      renderEditor();
    }

    function exportPDF() {
      // Switch to preview first for clean print
      if (state.view === 'edit') {
        showPreview();
        setTimeout(() => window.print(), 350);
      } else {
        window.print();
      }
    }

    // ─── GUARDAR EN LA NUBE (Google Apps Script) ───
    const URL_G = "https://script.google.com/macros/s/AKfycbz9xaB6Vfi1UGihaNDuO5dAEPygQ7cXcO2d0pIPE8VU5rAIjbYRwCZmNHxl69aVAMQ/exec";

    function showLoading(msg) {
      let overlay = document.getElementById('loading-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'loading-overlay';
        overlay.innerHTML = `
          <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,26,26,0.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <div style="width:50px;height:50px;border:3px solid rgba(200,164,92,0.2);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;"></div>
            <div style="font-family:var(--font-brand);font-size:18px;color:var(--gold-light);letter-spacing:4px;margin-bottom:8px;">MADERARTE</div>
            <div id="loading-msg" style="font-size:12px;color:var(--gold-light);opacity:0.7;letter-spacing:1px;">${msg || 'Procesando...'}</div>
          </div>`;
        document.body.appendChild(overlay);
      } else {
        overlay.style.display = 'block';
        const msgEl = document.getElementById('loading-msg');
        if (msgEl) msgEl.textContent = msg || 'Procesando...';
      }
    }

    function hideLoading() {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) overlay.style.display = 'none';
    }

    async function guardarEnNube() {
      const nombre = state.cliente.nombre.trim();
      if (!nombre) {
        alert('Por favor, ingresa al menos el nombre del cliente.');
        return;
      }

      showLoading('Generando documento...');

      try {
        // Create a dedicated offscreen container for clean capture
        const captureContainer = document.createElement('div');
        captureContainer.id = 'capture-area';
        captureContainer.style.cssText = 'position:fixed;left:0;top:0;width:800px;z-index:-1;opacity:0;pointer-events:none;background:#ffffff;overflow:visible;';
        captureContainer.innerHTML = renderDocument();
        document.body.appendChild(captureContainer);

        // Wait for images and fonts to load
        await new Promise(r => setTimeout(r, 600));

        showLoading('Capturando cotización...');

        // Get actual height of content
        const captureHeight = captureContainer.scrollHeight;

        const canvas = await html2canvas(captureContainer, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          width: 800,
          height: captureHeight + 10,
          windowWidth: 800,
          windowHeight: captureHeight + 10,
          backgroundColor: '#ffffff',
          logging: false,
          onclone: function(clonedDoc) {
            const clonedEl = clonedDoc.getElementById('capture-area');
            if (clonedEl) {
              clonedEl.style.opacity = '1';
              clonedEl.style.position = 'static';
              clonedEl.style.zIndex = 'auto';
              clonedEl.style.overflow = 'visible';
            }
          }
        });

        // Remove the temp container
        document.body.removeChild(captureContainer);

        showLoading('Creando PDF...');

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfPageHeight = pdf.internal.pageSize.getHeight();

        // Calculate the total height the image would be at A4 width
        const imgTotalHeight = (canvas.height * pdfWidth) / canvas.width;

        if (imgTotalHeight <= pdfPageHeight) {
          // Fits in one page
          const imgData = canvas.toDataURL('image/jpeg', 0.95);
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, imgTotalHeight);
        } else {
          // Multiple pages needed - slice the canvas
          const pageCanvasHeight = Math.floor(canvas.width * pdfPageHeight / pdfWidth);
          const totalPages = Math.ceil(canvas.height / pageCanvasHeight);

          for (let page = 0; page < totalPages; page++) {
            if (page > 0) pdf.addPage();

            const srcY = page * pageCanvasHeight;
            const srcH = Math.min(pageCanvasHeight, canvas.height - srcY);

            // Create a temporary canvas for this page slice
            const pageCanvas = document.createElement('canvas');
            pageCanvas.width = canvas.width;
            pageCanvas.height = srcH;
            const ctx = pageCanvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
            ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);

            const pageImgData = pageCanvas.toDataURL('image/jpeg', 0.95);
            const pageImgHeight = (srcH * pdfWidth) / canvas.width;
            pdf.addImage(pageImgData, 'JPEG', 0, 0, pdfWidth, pageImgHeight);
          }
        }

        const pdfBase64 = pdf.output('datauristring').split(',')[1];

        // Build description text
        let descripcionTexto = state.items.map(i =>
          `${i.cantidad}x ${i.descripcion}`
        ).filter(d => d.length > 3).join(' | ');

        const totalFinal = getTotal().toString();
        const nombreArchivo = `Cotizacion_${state.numero}_${nombre.replace(/\s+/g, '_').toUpperCase()}.pdf`;

        showLoading('Guardando en la nube...');

        const response = await fetch(URL_G, {
          method: 'POST',
          body: JSON.stringify({
            cedula: state.cliente.cedula,
            nombre: nombre.toUpperCase(),
            telefono: state.cliente.telefono,
            email: state.cliente.email,
            direccion: state.cliente.direccion,
            descripcion: descripcionTexto,
            total: totalFinal,
            observaciones: state.detalles,
            pdfBase64: pdfBase64,
            nombreArchivo: nombreArchivo
          })
        });

        const result = await response.json();

        if (result.status === 'success') {
          // Also download locally
          pdf.save(nombreArchivo);
          hideLoading();
          alert('¡Cotización N° ' + state.numero + ' guardada exitosamente en la nube y descargada!');
          // Update number for next
          state.numero = String(result.cotizacion ? parseInt(result.cotizacion) + 1 : parseInt(state.numero) + 1);
        } else {
          pdf.save(nombreArchivo);
          hideLoading();
          alert('El PDF se descargó, pero hubo un problema al guardar en la nube: ' + (result.message || ''));
        }
      } catch (e) {
        hideLoading();
        alert('Error: ' + e.message + '. ¿Deseas descargar el PDF localmente?');
        // Fallback: print
        window.print();
      }
    }

    // ─── INIT ───
    // Load cotización number from Apps Script
    fetch(URL_G)
      .then(r => r.json())
      .then(d => {
        if (d.status === 'ok' && d.nextCotizacion) {
          state.numero = String(d.nextCotizacion);
        }
        renderEditor();
      })
      .catch(() => {
        // Offline: start with 1
        renderEditor();
      });
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
