<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1E1F23">
    <title>Maderarte</title>
    <link rel="apple-touch-icon" href="logomaderarte2026.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face {
            font-family: 'Algerian';
            src: local('Algerian'), url('https://fonts.cdnfonts.com/s/13158/ALGER.woff') format('woff');
            font-weight: normal;
        }
        :root {
            --bg:#1E1F23;--surface:#262730;--surface-hover:#2C2D37;
            --surface-border:rgba(255,255,255,0.045);
            --orange:#F08A24;--orange-10:rgba(240,138,36,0.10);--orange-20:rgba(240,138,36,0.20);
            --gold:#D4A843;--gold-08:rgba(212,168,67,0.08);
            --white:#F4F2EF;--white-70:rgba(244,242,239,0.7);--white-40:rgba(244,242,239,0.4);
            --white-20:rgba(244,242,239,0.2);--white-08:rgba(244,242,239,0.08);
            --green:#3DD68C;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;overflow-x:hidden}
        body{
            background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--white-70);
            display:flex;flex-direction:column;align-items:center;
            padding:env(safe-area-inset-top,0px) 0 env(safe-area-inset-bottom,0px);
            -webkit-font-smoothing:antialiased;position:relative;
        }
        body::before{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background:
                radial-gradient(ellipse 50% 40% at 50% -5%,rgba(240,138,36,0.05) 0%,transparent 100%),
                radial-gradient(ellipse 40% 30% at 80% 90%,rgba(212,168,67,0.025) 0%,transparent 100%);
        }
        body::after{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.3;
            background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            background-size:128px 128px;
        }
        .rv{opacity:0;transform:translateY(18px);animation:rvl 0.6s cubic-bezier(0.16,1,0.3,1) forwards}
        @keyframes rvl{to{opacity:1;transform:translateY(0)}}
        .app{width:100%;max-width:400px;padding:56px 24px 36px;display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1}
        .header{text-align:center;margin-bottom:48px}
        .logo-frame{display:inline-block;position:relative;margin-bottom:22px}
        .logo-frame img{width:92px;height:92px;border-radius:50%;display:block;box-shadow:0 12px 44px rgba(0,0,0,0.4),0 0 0 1px rgba(212,168,67,0.06),0 0 60px rgba(240,138,36,0.06)}
        .logo-ring{position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(212,168,67,0.10);pointer-events:none}
        .brand-name{font-family:'Algerian',serif;font-weight:normal;font-size:2.1rem;color:var(--white);letter-spacing:7px;line-height:1}
        .brand-tagline{font-size:0.65rem;font-weight:300;font-style:italic;letter-spacing:1.2px;color:var(--white-40);margin-top:10px}
        .sep{width:36px;height:1px;margin:18px auto 0;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:0.3}
        .status{display:inline-flex;align-items:center;gap:7px;margin-top:16px;padding:5px 14px;border-radius:50px;background:rgba(61,214,140,0.05);border:1px solid rgba(61,214,140,0.10);font-size:0.5rem;font-weight:500;letter-spacing:2.2px;text-transform:uppercase;color:rgba(61,214,140,0.6)}
        .status i{width:5px;height:5px;background:var(--green);border-radius:50%;display:inline-block;box-shadow:0 0 6px rgba(61,214,140,0.5);animation:glow 2.8s ease-in-out infinite}
        @keyframes glow{0%,100%{opacity:1}50%{opacity:.25}}
        .nav{display:flex;flex-direction:column;gap:8px}
        .card{display:flex;align-items:center;gap:15px;padding:18px 17px;border-radius:16px;background:var(--surface);border:1px solid var(--surface-border);text-decoration:none;color:inherit;position:relative;overflow:hidden;transition:all 0.25s cubic-bezier(0.16,1,0.3,1)}
        .card.active{background:linear-gradient(135deg,var(--surface) 0%,rgba(240,138,36,0.035) 100%);border-color:var(--orange-20);box-shadow:0 2px 20px rgba(240,138,36,0.04)}
        .card.active::before{content:'';position:absolute;left:0;top:16px;bottom:16px;width:3px;border-radius:0 3px 3px 0;background:linear-gradient(to bottom,var(--orange),var(--gold))}
        .card.active:active{transform:scale(0.975);background:var(--surface-hover)}
        .card.locked{opacity:0.35;pointer-events:none}
        .card-icon{width:44px;height:44px;min-width:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem}
        .active .card-icon{background:var(--orange-10);color:var(--orange)}
        .locked .card-icon{background:var(--white-08);color:var(--white-20)}
        .card-info h3{font-size:0.72rem;font-weight:600;color:var(--white);letter-spacing:1px;margin-bottom:2px}
        .locked .card-info h3{color:var(--white-20)}
        .card-info p{font-size:0.58rem;font-weight:400;color:var(--white-40)}
        .locked .card-info p{color:var(--white-20)}
        .card-end{margin-left:auto;display:flex;align-items:center}
        .card .chevron{color:var(--orange);font-size:0.55rem;opacity:0.3;transition:opacity 0.2s,transform 0.2s}
        .card.active:active .chevron{opacity:0.7;transform:translateX(2px)}
        .card .badge-soon{font-size:0.4rem;font-weight:600;letter-spacing:1.6px;color:var(--white-20);text-transform:uppercase}
        .footer{margin-top:auto;text-align:center;padding-top:40px}
        .footer-sep{width:20px;height:1px;background:var(--white-08);margin:0 auto 14px}
        .footer-brand{font-family:'Algerian',serif;font-weight:normal;font-size:0.65rem;color:var(--white-08);letter-spacing:5px}
        .footer-copy{font-size:0.38rem;color:var(--white-08);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
    </style>
</head>
<body>
<div class="app">
    <div class="header rv" style="animation-delay:.06s">
        <div class="logo-frame"><div class="logo-ring"></div><img src="logomaderarte2026.png" alt="Maderarte"></div>
        <h1 class="brand-name">MADERARTE</h1>
        <p class="brand-tagline">Muebles con un estilo diferente para cada cliente</p>
        <div class="sep"></div>
        <div class="status"><i></i> Sistema en línea</div>
    </div>
    <nav class="nav">
        <a href="cotizacion.html" class="card active rv" style="animation-delay:.16s">
            <div class="card-icon"><i class="fa-solid fa-file-invoice-dollar"></i></div>
            <div class="card-info"><h3>COTIZACIONES</h3><p>Generar propuesta para cliente</p></div>
            <div class="card-end"><i class="fa-solid fa-chevron-right chevron"></i></div>
        </a>
        <div class="card locked rv" style="animation-delay:.22s">
            <div class="card-icon"><i class="fa-solid fa-clipboard-list"></i></div>
            <div class="card-info"><h3>ÓRDENES DE TRABAJO</h3><p>Próximamente</p></div>
            <div class="card-end"><span class="badge-soon">Pronto</span></div>
        </div>
        <div class="card locked rv" style="animation-delay:.28s">
            <div class="card-icon"><i class="fa-solid fa-address-book"></i></div>
            <div class="card-info"><h3>DIRECTORIO CLIENTES</h3><p>Próximamente</p></div>
            <div class="card-end"><span class="badge-soon">Pronto</span></div>
        </div>
        <div class="card locked rv" style="animation-delay:.34s">
            <div class="card-icon"><i class="fa-solid fa-chart-line"></i></div>
            <div class="card-info"><h3>FINANZAS Y ABONOS</h3><p>Próximamente</p></div>
            <div class="card-end"><span class="badge-soon">Pronto</span></div>
        </div>
    </nav>
    <footer class="footer rv" style="animation-delay:.44s">
        <div class="footer-sep"></div>
        <div class="footer-brand">MADERARTE</div>
        <div class="footer-copy">Software de Gestión &copy; 2026</div>
    </footer>
</div>
</body>
</html>
